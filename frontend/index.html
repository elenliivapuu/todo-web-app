<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>
        <input type="text" id="taskInput", placeholder="Enter a task">
        <button class="add-button" onclick="addTask()">Add</button>
        
        <div class="dropdown">
            <button class="three-dot" onclick="dropDown()">⋮</button>
            <div id="taskDropdown" class="dropdown-content">
                <div class="day-week-month-container">
                    <button class="day-button">Day</button>
                    <button class="week-button">Week</button>
                    <button class="month-button">Month</button>
                </div>
            </div>
        </div>

        

        <ul id="taskList" draggable="true"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
